<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWTE // Interactive Simulation Engine</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel-bg: #161b22;
            --accent: #58a6ff;
            --success: #3fb950;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { 
            margin: 0; 
            color: var(--accent); 
            font-family: monospace; 
            font-size: 2.5rem; 
        }
        
        .subtitle { 
            color: var(--text-muted); 
            margin: 5px 0 0 0; 
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
        }

        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group.checkbox {
            flex-direction: row;
            align-items: center;
            cursor: pointer;
            padding-bottom: 8px;
        }

        label { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            font-weight: 600; 
        }

        input[type="number"] {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            border-radius: 4px;
            width: 180px;
        }

        .primary-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .primary-btn:hover { 
            filter: brightness(1.1); 
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) { 
            .workspace { grid-template-columns: 1fr; } 
        }

        textarea, .output-box {
            width: 100%;
            height: 280px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 0.9rem;
            overflow-y: auto;
        }

        .output-box {
            white-space: pre-wrap;
            background: #090d13;
        }

        .highlight-system { color: #ff7b72; font-weight: bold; }
        .highlight-kept { color: #79c0ff; }
        .highlight-dropped { color: var(--text-muted); text-decoration: line-through; opacity: 0.4; }

        .metrics-bar {
            display: flex;
            justify-content: space-around;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
        }

        .metric .label { color: var(--text-muted); }
        .metric strong { color: var(--accent); font-size: 1.2rem; }
        .metric.savings strong { color: var(--success); font-size: 1.4rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔪 SWTE</h1>
            <p class="subtitle">Sliding Window Trim Engine — Live Edge Token Optimization Simulator</p>
        </header>

        <main>
            <div class="panel control-panel">
                <div class="input-group">
                    <label for="maxTokens">Max Target Token Constraint:</label>
                    <input type="number" id="maxTokens" value="150" min="50" max="1000">
                </div>
                <div class="input-group">
                    <label for="windowSize">Sliding Window Segment Width:</label>
                    <input type="number" id="windowSize" value="40" min="10" max="200">
                </div>
                <div class="input-group checkbox">
                    <input type="checkbox" id="keepSystem" checked>
                    <label for="keepSystem">Pin Core System Instructions (Semantic Guard)</label>
                </div>
                <button id="runBtn" class="primary-btn">Execute Truncation Pass</button>
            </div>

            <div class="workspace">
                <div class="panel">
                    <h3>Raw Input Context Buffer</h3>
                    <textarea id="inputText" placeholder="Enter long context data here...">SYSTEM: You are a secure operating system terminal. Complete all tasks under strict security protocols. 

[USER]: Log entry 1: System initiated. Everything working fine.
[USER]: Log entry 2: Database replication synced across European clusters.
[USER]: Log entry 3: Network spike detected in US-East endpoint. Investigating cause.
[USER]: Log entry 4: False alarm, it was just a scheduled stress testing execution.
[USER]: Log entry 5: Updated security dependencies across all target application images.
[USER]: Requesting current operational health index status report from the central registry proxy.</textarea>
                </div>

                <div class="panel">
                    <h3>Optimized Payload Output</h3>
                    <div id="outputText" class="output-box">Processing pipeline data...</div>
                </div>
            </div>

            <div class="metrics-bar">
                <div class="metric"><span class="label">Raw Content Tokens:</span> <strong id="rawTokens">0</strong></div>
                <div class="metric"><span class="label">Optimized Output Tokens:</span> <strong id="optimizedTokens">0</strong></div>
                <div class="metric savings"><span class="label">Total Savings:</span> <strong id="savingsPct">0%</strong></div>
            </div>
        </main>
    </div>

    <script>
        // Quick Mock Tokenizer calculation
        function estimateTokens(text) {
            if (!text.trim()) return 0;
            return Math.ceil(text.split(/[\s\p{P}]+/u).filter(Boolean).length * 1.3);
        }

        function runTruncation() {
            const rawText = document.getElementById('inputText').value;
            const maxTokens = parseInt(document.getElementById('maxTokens').value);
            const keepSystem = document.getElementById('keepSystem').checked;

            let systemPrompt = "";
            let bodyText = rawText;

            // 1. Isolate Core System Prompts if Pinned
            if (keepSystem && rawText.toUpperCase().startsWith("SYSTEM:")) {
                const lines = rawText.split("\n");
                systemPrompt = lines[0] + "\n\n";
                bodyText = lines.slice(1).join("\n");
            }

            const sysTokenCount = estimateTokens(systemPrompt);
            const maxBodyTokens = maxTokens - sysTokenCount;

            // Split context blocks by lines
            const blocks = bodyText.split("\n").filter(line => line.trim() !== "");
            
            let processedHTML = "";
            let acceptedText = systemPrompt;
            
            if (systemPrompt) {
                processedHTML += `<span class="highlight-system">${systemPrompt}</span>`;
            }

            // 2. Execute Iterative Sliding Window Pass (Bottom-up priority for message logs)
            let currentBodyTokens = 0;
            let outputs = [];

            for (let i = blocks.length - 1; i >= 0; i--) {
                let blockTokens = estimateTokens(blocks[i]);
                
                if (currentBodyTokens + blockTokens <= maxBodyTokens) {
                    currentBodyTokens += blockTokens;
                    outputs.unshift(`<span class="highlight-kept">${blocks[i]}</span>`);
                    acceptedText += blocks[i] + "\n";
                } else {
                    outputs.unshift(`<span class="highlight-dropped">${blocks[i]} (Pruned Sliding Window Context Block)</span>`);
                }
            }

            processedHTML += outputs.join("\n");

            // 3. Render Output & Metrics Breakdown
            const totalRawTokens = estimateTokens(rawText);
            const finalTokens = estimateTokens(acceptedText);
            const savings = totalRawTokens > 0 ? Math.round(((totalRawTokens - finalTokens) / totalRawTokens) * 100) : 0;

            document.getElementById('outputText').innerHTML = processedHTML;
            document.getElementById('rawTokens').innerText = totalRawTokens;
            document.getElementById('optimizedTokens').innerText = finalTokens;
            document.getElementById('savingsPct').innerText = `${savings}%`;
        }

        document.getElementById('runBtn').addEventListener('click', runTruncation);
        window.onload = runTruncation;
    </script>
</body>
</html>
